name: docs

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm docs:build

      - name: Publish to gh-pages
        env:
          PUBLISH_DIR: ${{ runner.temp }}/gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true

          if git show-ref --quiet refs/remotes/origin/gh-pages; then
            git worktree add "$PUBLISH_DIR" origin/gh-pages
          else
            git worktree add -B gh-pages "$PUBLISH_DIR"
          fi

          find "$PUBLISH_DIR" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R docs/dist/. "$PUBLISH_DIR"/
          touch "$PUBLISH_DIR/.nojekyll"

          cd "$PUBLISH_DIR"
          git add --all

          if git diff --cached --quiet; then
            echo "No docs changes to publish."
            exit 0
          fi

          git commit -m "docs: publish site"
          git push origin HEAD:gh-pages
